<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naše besídka</title>
  <style>
    :root {
      --cream: #f6efe5;
      --sand: rgba(246, 239, 229, 0.82);
      --ink: #2f241d;
      --accent: #8c5a3c;
      --accent-strong: #6f452c;
      --shadow: rgba(21, 14, 10, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background: #efe5d7;
    }

    .hero {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 2rem 7rem;
      isolation: isolate;
      background: #1f1713;
    }

    .hero-topline {
      position: absolute;
      top: 2.2rem;
      left: 50%;
      z-index: 2;
      transform: translateX(-50%);
      width: min(calc(100% - 2rem), 42rem);
      text-align: center;
      color: var(--cream);
      font-size: clamp(1.8rem, 4.8vw, 2.6rem);
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-shadow:
        0 2px 10px rgba(0, 0, 0, 0.7),
        0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(18, 12, 8, 0.2), rgba(18, 12, 8, 0.58)),
        radial-gradient(circle at top, rgba(255, 255, 255, 0.14), transparent 42%);
      z-index: 1;
    }

    .music-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      margin-top: 1rem;
      padding: 0.65rem 1rem;
      border: 0;
      border-radius: 999px;
      background: rgba(30, 20, 15, 0.48);
      color: #fffaf4;
      cursor: pointer;
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.2);
      transition: transform 180ms ease, background 180ms ease;
    }

    .music-toggle:hover,
    .music-toggle:focus-visible {
      background: rgba(30, 20, 15, 0.72);
      transform: translateY(-1px);
    }

    .music-toggle svg {
      width: 1.35rem;
      height: 1.35rem;
      stroke: currentColor;
      fill: none;
      flex: none;
    }

    .music-label {
      font-size: 0.95rem;
      line-height: 1;
      white-space: nowrap;
    }

    .music-toggle .sound-on-icon {
      display: none;
    }

    .music-toggle.is-playing .sound-off-icon {
      display: none;
    }

    .music-toggle.is-playing .sound-on-icon {
      display: block;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-position: center;
      background-size: cover;
      opacity: 0;
      transform: scale(1.05);
      transition: opacity 1.8s ease-in-out, transform 5s ease-out;
      will-change: opacity, transform;
    }

    .hero-bg.is-active {
      opacity: 1;
      transform: scale(1);
    }

    .hero-card {
      position: relative;
      z-index: 2;
      max-width: 42rem;
      width: min(100%, 42rem);
      padding: 1rem 1.25rem;
      text-align: center;
      color: var(--cream);
      margin-top: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .eyebrow {
      margin: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 6vw, 4.35rem);
      font-weight: 400;
      line-height: 1.02;
      max-width: 12ch;
      margin-inline: auto;
      letter-spacing: 0.04em;
      text-shadow:
        0 4px 18px rgba(0, 0, 0, 0.72),
        0 12px 34px rgba(0, 0, 0, 0.42);
    }

    .hero-arrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.4rem;
      height: 2.4rem;
      margin-top: 1.2rem;
      color: #ffffff;
      text-decoration: none;
      animation: arrow-bob 1.8s ease-in-out infinite;
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.55));
    }

    .hero-arrow svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
    }

    @keyframes arrow-bob {
      0%, 100% {
        transform: translateY(0);
        opacity: 0.8;
      }
      50% {
        transform: translateY(0.35rem);
        opacity: 1;
      }
    }

    .details {
      position: relative;
      margin-top: -2.25rem;
      padding: 1.4rem 1.25rem 5rem;
      z-index: 3;
    }

    .details-card {
      max-width: 46rem;
      margin: 0 auto;
      padding: 2.6rem 2rem;
      background: var(--sand);
      box-shadow: 0 18px 60px rgba(50, 33, 23, 0.12);
      border-radius: 1.2rem;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .details-card h2 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      font-weight: 400;
    }

    .details-card .tagline {
      margin: 0.9rem 0 0;
      font-size: clamp(1rem, 2.8vw, 1.4rem);
      font-style: italic;
    }

    .details-card .date {
      margin: 1.2rem 0 0;
      font-size: clamp(1.3rem, 3vw, 1.7rem);
      letter-spacing: 0.04em;
    }

    .cta {
      display: inline-block;
      margin-top: 1.8rem;
      padding: 0.95rem 1.5rem;
      border-radius: 999px;
      background: var(--accent);
      color: #fffaf4;
      text-decoration: none;
      font-size: 1rem;
      transition: background 180ms ease, transform 180ms ease;
    }

    .cta:hover,
    .cta:focus-visible {
      background: var(--accent-strong);
      transform: translateY(-1px);
    }

    .coming-soon {
      margin: 1.5rem 0 0;
      font-size: 1rem;
      opacity: 0.82;
    }

    .venue {
      margin-top: 1.6rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      color: var(--accent-strong);
    }

    .venue-link {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      color: inherit;
      text-decoration: none;
    }

    .venue-label {
      display: inline-flex;
      align-items: center;
      gap: 0.38rem;
    }

    .venue-link:hover,
    .venue-link:focus-visible {
      text-decoration: underline;
      text-underline-offset: 0.18em;
    }

    .venue-icon {
      width: 1.9rem;
      height: 1.9rem;
    }

    .venue-name {
      font-size: 1.08rem;
    }

    .link-icon {
      width: 1.05rem;
      height: 1.05rem;
      opacity: 0.8;
    }

    @media (max-width: 640px) {
      .hero {
        padding: 1.25rem 1rem 5rem;
      }

      .hero-topline {
        top: 1.4rem;
        width: min(calc(100% - 1.5rem), 30rem);
        font-size: 1.55rem;
        letter-spacing: 0.16em;
      }

      .hero-card {
        padding: 0.75rem 0.5rem;
      }

      .details {
        margin-top: -1.25rem;
        padding-top: 0.9rem;
      }

      .details-card {
        padding: 2rem 1.3rem;
      }

      .music-toggle {
        margin-top: 0.9rem;
        padding: 0.6rem 0.9rem;
      }

      .music-label {
        font-size: 0.88rem;
      }
    }

    @media (min-width: 641px) and (max-width: 1024px) {
      .hero {
        padding-bottom: 6rem;
      }

      .hero-topline {
        top: 1.8rem;
      }

      .hero-card {
        width: min(100%, 38rem);
      }

      .details {
        margin-top: -1.5rem;
        padding-top: 1rem;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="hero-bg is-active" style="background-image: url('pictures/pic3.png');"></div>
    <div class="hero-bg" style="background-image: url('pictures/pic4.png');"></div>
    <div class="hero-bg" style="background-image: url('pictures/pic5.png');"></div>
    <div class="hero-bg" style="background-image: url('pictures/pic6.png');"></div>
    <div class="hero-bg" style="background-image: url('pictures/pic7.png');"></div>
    <div class="hero-bg" style="background-image: url('pictures/pic8.png');"></div>
    <div class="hero-bg" style="background-image: url('pictures/pic9.png');"></div>
    <div class="hero-bg" style="background-image: url('pictures/pic10.png');"></div>
    <p class="hero-topline">Zveme vás na</p>

    <div class="hero-card">
      <h1>naší besídku (svatbu)</h1>
      <button class="music-toggle" type="button" aria-pressed="false" aria-label="Přehrát hudbu">
        <svg class="sound-off-icon" viewBox="0 0 24 24" aria-hidden="true" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 9h4l5-4v14l-5-4H4z"></path>
          <path d="M3 3l18 18"></path>
        </svg>
        <svg class="sound-on-icon" viewBox="0 0 24 24" aria-hidden="true" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 9h4l5-4v14l-5-4H4z"></path>
          <path d="M16 9.5a4.5 4.5 0 0 1 0 5"></path>
          <path d="M18.5 7a8 8 0 0 1 0 10"></path>
        </svg>
        <span class="music-label">Nalaďte se</span>
      </button>
      <a class="hero-arrow" href="#info" aria-label="Posunout na další informace">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 9l6 6 6-6"></path>
        </svg>
      </a>
    </div>
  </header>

  <audio id="site-music" preload="none">
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <main class="details" id="info">
    <section class="details-card">
      <h2>Save the date!</h2>
      <p class="tagline">(česky přijď nebo chcípneš)</p>
      <p class="date">19. září 2026</p>
      <a
        class="cta"
        href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Save%20the%20date!&dates=20260919/20260920&location=Don%C3%A1t%C5%AFv%20Ml%C3%BDn&ctz=Europe%2FPrague&details=Svatebn%C3%AD%20den%20na%20Don%C3%A1tov%C4%9B%20Ml%C3%BDn%C4%9B."
        target="_blank"
        rel="noreferrer"
      >přidat do kalendáře</a>
      <div class="venue">
        <a
          class="venue-link"
          href="https://maps.app.goo.gl/7N3g2TTYRGebprd16"
          target="_blank"
          rel="noreferrer"
          aria-label="Otevřít Donátův Mlýn v Google Maps"
        >
          <svg class="venue-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 21s6-5.56 6-11a6 6 0 1 0-12 0c0 5.44 6 11 6 11z"></path>
            <circle cx="12" cy="10" r="2.5"></circle>
          </svg>
          <span class="venue-label">
            <span class="venue-name">Donátův Mlýn</span>
            <svg class="link-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 13a5 5 0 0 0 7.07 0l2.12-2.12a5 5 0 1 0-7.07-7.07L10.7 5.22"></path>
              <path d="M14 11a5 5 0 0 0-7.07 0L4.81 13.12a5 5 0 0 0 7.07 7.07l1.41-1.41"></path>
            </svg>
          </span>
        </a>
      </div>
      <p class="coming-soon">Další informace brzy doplníme.</p>
    </section>
  </main>

  <script>
    const backgrounds = document.querySelectorAll(".hero-bg");
    const music = document.getElementById("site-music");
    const musicToggle = document.querySelector(".music-toggle");
    const imagePaths = [
      "pictures/pic3.png",
      "pictures/pic4.png",
      "pictures/pic5.png",
      "pictures/pic6.png",
      "pictures/pic7.png",
      "pictures/pic8.png",
      "pictures/pic9.png",
      "pictures/pic10.png"
    ];
    let activeIndex = 0;

    const firstImage = imagePaths[0];
    const remainingImages = imagePaths.slice(1);

    for (let i = remainingImages.length - 1; i > 0; i -= 1) {
      const randomIndex = Math.floor(Math.random() * (i + 1));
      [remainingImages[i], remainingImages[randomIndex]] = [remainingImages[randomIndex], remainingImages[i]];
    }

    const orderedImages = [firstImage, ...remainingImages];

    backgrounds.forEach((background, index) => {
      background.style.backgroundImage = `url('${orderedImages[index]}')`;
    });

    musicToggle.addEventListener("click", async () => {
      if (music.paused) {
        try {
          await music.play();
          musicToggle.classList.add("is-playing");
          musicToggle.setAttribute("aria-pressed", "true");
          musicToggle.setAttribute("aria-label", "Pozastavit hudbu");
        } catch (error) {
          musicToggle.setAttribute("aria-label", "Hudbu se nepodařilo přehrát");
        }
        return;
      }

      music.pause();
      musicToggle.classList.remove("is-playing");
      musicToggle.setAttribute("aria-pressed", "false");
      musicToggle.setAttribute("aria-label", "Přehrát hudbu");
    });

    music.addEventListener("ended", () => {
      musicToggle.classList.remove("is-playing");
      musicToggle.setAttribute("aria-pressed", "false");
      musicToggle.setAttribute("aria-label", "Přehrát hudbu");
    });

    setInterval(() => {
      backgrounds[activeIndex].classList.remove("is-active");
      activeIndex = (activeIndex + 1) % backgrounds.length;
      backgrounds[activeIndex].classList.add("is-active");
    }, 5000);
  </script>
</body>
</html>
